<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hila Jungle</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="script.js" defer></script>
</head>
<body>

    <audio id="bg-music" src="sounds/jungle sound.mp3" loop></audio>

    <header>
        <h1>Welcome to the Jungle</h1>
        <p>Click on an animal or press the corresponding keyboard key to play its sound.</p>
    </header>

    <main class="jungle-container">
        
        <div class="animal-card" data-key="c">
            <img src="images/cow.jpg" alt="Cow" id="cow-img">
            <audio id="sound-c" src="sounds/cow sound.mp3"></audio>
            <div class="key-hint">C</div>
        </div>

        <div class="animal-card" data-key="p">
            <img src="images/Peacock.webp" alt="Peacock" id="peacock-img">
            <audio id="sound-p" src="sounds/peacock sound.mp3"></audio>
            <div class="key-hint">P</div>
        </div>

        <div class="animal-card" data-key="s">
            <img src="images/Sloth.jpeg" alt="Sloth" id="sloth-img">
            <audio id="sound-s" src="sounds/Sloth sound.mp3"></audio>
            <div class="key-hint">S</div>
        </div>

        <div class="animal-card" data-key="d">
            <img src="images/Dolphin.jpg" alt="Dolphin" id="dolphin-img">
            <audio id="sound-d" src="sounds/Dolphin sound.mp3"></audio>
            <div class="key-hint">D</div>
        </div>

        <div class="animal-card" data-key="l">
            <img src="images/Lemur.webp" alt="Lemur" id="lemur-img">
            <audio id="sound-l" src="sounds/Lemur sound.mp3"></audio>
            <div class="key-hint">L</div>
        </div>

        <div class="animal-card" data-key="a">
            <img src="images/Alpaca.jpg" alt="Alpaca" id="alpaca-img">
            <audio id="sound-a" src="sounds/Alpaca sound.mp3"></audio>
            <div class="key-hint">A</div>
        </div>

        <div class="animal-card" data-key="h">
            <img src="images/Horse.webp" alt="Horse" id="horse-img">
            <audio id="sound-h" src="sounds/Horse sound.mp3"></audio>
            <div class="key-hint">H</div>
        </div>

    </main>

</body>
</html>
